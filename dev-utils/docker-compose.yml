
services:

  mysql:
    container_name: mysql
    image: mysql:8.0

    ports:
      - 3306:3306

    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=gatekeeper
      - MYSQL_USER=gatekeeper
      - MYSQL_PASSWORD=gatekeeper

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - default

volumes:
  mysql-data:
